# Provider de dashboards: carrega os JSON de /var/lib/grafana/dashboards
# (montado a partir de infra/observability/grafana/dashboards).
apiVersion: 1

providers:
  - name: tagix
    orgId: 1
    folder: tagix
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
