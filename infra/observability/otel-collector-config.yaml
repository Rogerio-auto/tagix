# OpenTelemetry Collector — dev. Recebe traces + métricas OTLP dos apps Node
# (via @hm/logger, opt-in por OTEL_EXPORTER_OTLP_ENDPOINT) e expõe as métricas
# num endpoint Prometheus interno (8889) scrapeado pelo Prometheus do stack.
#
# Apps nativos no Windows host apontam OTEL_EXPORTER_OTLP_ENDPOINT para
# http://localhost:4318 (OTLP/HTTP) — o compose publica essa porta.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  # Métricas → endpoint Prometheus interno (job `otel-collector` no prometheus.yml).
  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: true
    resource_to_telemetry_conversion:
      enabled: true
  # Traces e logs no console do collector (dev). Em prod: trocar por OTLP→backend.
  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
