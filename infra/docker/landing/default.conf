# Landing/legal — URLs limpas: /privacidade -> privacidade.html, /termos -> termos.html
server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Tenta o arquivo exato, depois /dir, depois .html (URL limpa), senão 404.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Sem cache agressivo nas páginas legais (a Meta revalida o conteúdo).
    location ~* \.(html)$ {
        add_header Cache-Control "public, max-age=300";
    }
}
