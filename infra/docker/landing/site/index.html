<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Leadium</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: ui-sans-serif, -apple-system, "Segoe UI", Inter, system-ui, sans-serif;
        background: radial-gradient(120% 120% at 50% 0%, #0b0f17 0%, #05070b 60%, #000 100%);
        color: #e7ecf3;
        display: grid;
        place-items: center;
        min-height: 100svh;
        -webkit-font-smoothing: antialiased;
      }
      main { text-align: center; padding: 2rem; max-width: 36rem; }
      .mark {
        font-size: clamp(2.75rem, 9vw, 5rem);
        font-weight: 600;
        letter-spacing: -0.04em;
        background: linear-gradient(180deg, #ffffff 0%, #9fb4cc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        margin-top: 1.25rem;
        font-size: clamp(0.95rem, 2.4vw, 1.075rem);
        line-height: 1.6;
        color: #8a97a8;
      }
      .dot {
        display: inline-block;
        width: 6px; height: 6px;
        margin-right: 0.5rem;
        border-radius: 999px;
        background: #34d399;
        box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.6);
        animation: pulse 2s infinite;
        vertical-align: middle;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(52,211,153,0.55); }
        70% { box-shadow: 0 0 0 10px rgba(52,211,153,0); }
        100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
      }
      .meta { margin-top: 2.5rem; font-size: 0.8rem; color: #5b6675; letter-spacing: 0.02em; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">Leadium</div>
      <p><span class="dot"></span>Estamos construindo algo excepcional. Em breve.</p>
      <div class="meta">leadium.com.br</div>
    </main>
  </body>
</html>
